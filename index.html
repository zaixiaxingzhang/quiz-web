    el._isQuizPage = true; // 标记为做题页，阻止 popstate 误触返回
    StudyTimer.start(); // 进入做题/考试页面开始计时

    let curIdx = startIdx;
    let answered = false;
    let userAnswer = null;
    let answers = new Array(questions.length).fill(null); // 记录作答
    let examTimer = null;

    // 预生成每道选择题的选项乱序（键=原始字母，值=新字母）
    // 同时保存打乱后的 options 数组，避免每次渲染重新打乱
    const shuffledOpts = questions.map(q => {
      if ((q.type !== '单选' && q.type !== '多选') || !q.options || q.options.length < 2) return null;
      const indices = q.options.map((_, i) => i);
      // Fisher-Yates shuffle
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      // indices[newPos] = oldPos
      const newOptions = indices.map(oi => q.options[oi]);
      // oldLetter -> newLetter mapping
      const oldToNew = {};
      indices.forEach((oldIdx, newIdx) => {
        oldToNew[String.fromCharCode(65 + oldIdx)] = String.fromCharCode(65 + newIdx);
      });
      // newLetter -> old option text (for display)
      return { options: newOptions, oldToNew };
    });
    let examSecLeft = timeLimit * 60;
    let examStartTime = Date.now();

    const isExam = mode === 'exam';
    const modeLabel = { practice:'练习', review:'学习', wrong:'错题练习', exam:'考试' }[mode] || '练习';

    // AppBar
    const appbar = document.createElement('div');
    appbar.className = 'appbar';
    appbar.innerHTML = `
      <button class="appbar-btn" onclick="this.closest('.page')._quit()">${Icons.close}</button>
      <span class="appbar-title">${modeLabel}</span>
      <div class="appbar-actions" id="quiz-appbar-right">
        ${isExam && timeLimit > 0 ? `<div class="exam-timer" id="exam-timer">${Icons.clock}<span id="timer-text">${Utils.fmtTime(examSecLeft)}</span></div>` : ''}
      </div>
    `;
    el.appendChild(appbar);

    // 进度条
    const progressDiv = document.createElement('div');
    progressDiv.className = 'quiz-header';
    progressDiv.innerHTML = `
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quiz-progress" style="width:${(curIdx+1)/questions.length*100}%"></div>
      </div>
      <span class="quiz-count" id="quiz-count">${curIdx+1}/${questions.length}</span>
    `;
    el.appendChild(progressDiv);

    // 题目区域
    const body = document.createElement('div');
    body.className = 'quiz-body';
    el.appendChild(body);

    // 底部操作栏
    const footer = document.createElement('div');
    footer.className = 'quiz-footer';
    el.appendChild(footer);

    function renderQ() {
      const q = questions[curIdx];
      if (!q) return;
      // 考试模式：答案永远不"锁定"，直到点击提交考试
      answered = isExam ? false : answers[curIdx] !== null;
      userAnswer = answers[curIdx];

      // 更新进度（用 el.querySelector 而非 document.getElementById，兼容页面未挂载时）
      const progressFill = el.querySelector('#quiz-progress');
      const countEl = el.querySelector('#quiz-count');
      if (progressFill) progressFill.style.width = `${(curIdx+1)/questions.length*100}%`;
      if (countEl) countEl.textContent = `${curIdx+1}/${questions.length}`;

      const typeColors = { '单选':'var(--accent)', '判断':'var(--success)', '填空':'var(--warn)' };
      let qBody = '';
      // 多选题：userAnswer 存为字母数组
      let multiSelected = (q.type === '多选' && Array.isArray(userAnswer)) ? [...userAnswer] : [];

      if (q.type === '单选') {
        const sh = shuffledOpts[curIdx];
        const opts = sh ? sh.options : (q.options || []);
        // 映射：如果有打乱，正确答案字母也要换算
        const correctLetter = sh ? (sh.oldToNew[q.answer] || q.answer) : q.answer;
        const displayAnswer = sh ? (sh.oldToNew[userAnswer] || userAnswer) : userAnswer;
        qBody = `<div class="option-list">
          ${opts.map((o, i) => {
            const letter = String.fromCharCode(65+i);
            let cls = '';
            if (isExam) {
              if (letter === displayAnswer) cls = 'selected';
            } else if (answered) {
              if (letter === correctLetter) cls = 'correct';
              else if (letter === displayAnswer && displayAnswer !== correctLetter) cls = 'wrong';
            } else if (letter === displayAnswer) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${letter}">
              <div class="option-letter">${letter}</div>
              <div class="option-text">${Utils.esc(o)}</div>
              ${!isExam && answered && letter === correctLetter ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else if (q.type === '多选') {
        const sh = shuffledOpts[curIdx];
        const opts = sh ? sh.options : (q.options || []);
        // 正确答案字母集合（映射到打乱后的字母）
        const origCorrect = Array.isArray(q.answer) ? q.answer : (q.answer||'').split('').filter(ch => /[A-Z]/.test(ch));
        const correctLetters = sh ? origCorrect.map(l => sh.oldToNew[l] || l) : origCorrect;
        // 用户已选（存的是原始字母，显示时转换）
        const displaySelected = sh
          ? multiSelected.map(l => sh.oldToNew[l] || l)
          : multiSelected;
        qBody = `
          ${!answered ? '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">多选题，选完后点击提交</div>' : ''}
          <div class="option-list" id="multi-opts">
          ${opts.map((o, i) => {
            const letter = String.fromCharCode(65+i);
            const isCorrectOpt = correctLetters.includes(letter);
            const displayAns = sh && Array.isArray(userAnswer)
              ? userAnswer.map(l => sh.oldToNew[l] || l)
              : userAnswer;
            const userChose = answered
              ? (Array.isArray(displayAns) ? displayAns.includes(letter) : (displayAns||'').includes(letter))
              : displaySelected.includes(letter);
            let cls = '';
            if (answered) {
              if (isCorrectOpt) cls = 'correct';
              else if (userChose) cls = 'wrong';
            } else if (userChose) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${letter}" style="position:relative">
              <div class="option-letter">${letter}</div>
              <div class="option-text">${Utils.esc(o)}</div>
              ${answered && isCorrectOpt ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
          </div>`;
      } else if (q.type === '判断') {
        const opts = ['正确', '错误'];
        qBody = `<div class="option-list">
          ${opts.map(o => {
            let cls = '';
            if (isExam) {
              if (o === userAnswer) cls = 'selected';
            } else if (answered) {
              if (o === q.answer) cls = 'correct';
              else if (o === userAnswer && userAnswer !== q.answer) cls = 'wrong';
            } else if (o === userAnswer) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${o}">
              <div class="option-letter">${o === '正确' ? '✓' : '✗'}</div>
              <div class="option-text">${o}</div>
              ${!isExam && answered && o === q.answer ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else {
        // 填空题
        const fillCorrect = answered ? isCorrect(q, userAnswer) : false;
        const fillSkipped = answered && userAnswer === '__skipped__';
        const allAnswers = q.answers && q.answers.length ? q.answers : [q.answer];
        qBody = `
          <div class="fill-input-wrap">
            <input class="fill-input" id="fill-answer" placeholder="输入你的答案..."
              value="${answered ? Utils.esc(userAnswer||'') : ''}"
              ${answered ? 'readonly' : ''}>
          </div>
          ${answered ? `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
              <span class="tag ${fillCorrect ? 'tag-success' : fillSkipped ? 'tag-warn' : 'tag-danger'}">
                ${fillCorrect ? '✓ 正确' : fillSkipped ? '？ 不会做' : '✗ 错误'}
              </span>
            </div>
            <div style="background:var(--success-light);border-radius:10px;padding:12px;margin-bottom:8px">
              <div style="font-size:13px;color:var(--success);font-weight:600;margin-bottom:6px">正确答案</div>
              ${allAnswers.map((a, i) => `
                <div style="font-size:15px;color:var(--text);${i>0?'margin-top:4px;padding-top:4px;border-top:1px solid rgba(0,0,0,0.06)':''}">
                  ${i>0?`备选${i}：`:''}${Utils.esc(a)}
                </div>`).join('')}
            </div>
          ` : ''}
        `;
      }

      // 搜题+笔记按钮（答完或不会做后显示）
      const showSearch = answered && !isExam;
      const hasNote = q.note && q.note.trim();
      body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="quiz-type-badge" style="margin-bottom:0">${q.type}</div>
          ${showSearch ? `<div style="display:flex;gap:6px">
            <button id="quiz-note-btn" style="display:flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;border-radius:12px;border:1px solid ${hasNote?'var(--warn)':'var(--border)'};background:${hasNote?'var(--warn-light)':'var(--surface2)'};color:${hasNote?'var(--warn)':'var(--text3)'}">✏️ ${hasNote?'查看笔记':'记笔记'}</button>
            <button id="quiz-search-btn" style="display:flex;align-items:center;gap:3px;color:var(--accent);font-size:12px;padding:3px 8px;border:1px solid var(--accent-light);border-radius:12px;background:var(--accent-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>&nbsp;搜题</button>
          </div>` : ''}
        </div>
        <div class="quiz-question">${Utils.esc(q.question)}</div>
        ${qBody}
        ${answered && q.explanation ? `
          <div class="explanation-box">
            <div class="explanation-title">💡 解析</div>
            <div class="explanation-text">${Utils.esc(q.explanation)}</div>
          </div>` : ''}
      `;
      if (showSearch) {
        body.querySelector('#quiz-search-btn')?.addEventListener('click', () => {
          window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(q.question), '_blank');
        });
        body.querySelector('#quiz-note-btn')?.addEventListener('click', () => {
          Actions._showNoteEditor(q, () => renderQ());
        });
      }

      // 选项点击
      if (!answered || isExam) {
        body.querySelectorAll('.option-item').forEach(opt => {
          opt.onclick = () => {
            const displayLetter = opt.dataset.letter;
            // 还原为原始字母（shuffle 反向映射）
            const sh = shuffledOpts[curIdx];
            let letter = displayLetter;
            if (sh) {
              // 找 oldToNew 中值等于 displayLetter 的键
              letter = Object.keys(sh.oldToNew).find(k => sh.oldToNew[k] === displayLetter) || displayLetter;
            }
            if (q.type === '多选') {
              // 多选：toggle选中，不自动提交
              if (multiSelected.includes(letter)) {
                multiSelected = multiSelected.filter(l => l !== letter);
                opt.classList.remove('selected');
              } else {
                multiSelected.push(letter);
                opt.classList.add('selected');
              }
              if (isExam) answers[curIdx] = [...multiSelected];
              renderFooter(); // 更新提交按钮状态
            } else if (isExam) {
              userAnswer = letter;
              answers[curIdx] = letter;
              body.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
            } else {
              if (answered) return;
              // 练习模式：单选/判断 只高亮选中，不立即提交，等用户点"提交"按钮
              userAnswer = letter;
              body.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
              renderFooter(); // 更新提交按钮状态
            }
          };
        });
      }

      // 底部按钮
      renderFooter();
    }

    function renderFooter() {
      const isFirst = curIdx === 0;
      const isLast = curIdx === questions.length - 1;
      const q = questions[curIdx];
      const isMulti = q?.type === '多选';

      if (isExam) {
        footer.innerHTML = `
          <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._prev()" style="${isFirst?'opacity:0.4':''}">上一题</button>
          ${isLast
            ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._submitExam()">提交考试</button>`
            : `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._next()">下一题</button>`}
        `;
      } else {
        footer.innerHTML = `
          <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._prev()" style="padding:10px 8px;font-size:13px;flex:0 0 auto;${isFirst?'opacity:0.4':''}">上题</button>
          ${!answered
            ? (q?.type === '填空'
                ? `<span style="display:flex;gap:6px;flex:1">
                    <button class="btn btn-outline" onclick="this.closest('.page')._skipQ()" style="color:var(--warn);border-color:var(--warn);flex:0 0 auto;padding:10px 12px">不会做</button>
                    <button class="btn btn-primary flex-1" onclick="this.closest('.page')._submitFill()">提交</button>
                  </span>`
                : isMulti
                  ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._submitMulti()" ${multiSelected.length===0?'disabled style="opacity:0.4"':''}>提交答案</button>`
                  : `<span style="display:flex;gap:6px;flex:1">
                      <button class="btn btn-outline" onclick="this.closest('.page')._skipQ()" style="color:var(--warn);border-color:var(--warn);flex:0 0 auto;padding:10px 12px">不会做</button>
                      <button class="btn btn-primary flex-1" onclick="this.closest('.page')._submitSingle()" ${!userAnswer?'disabled style="opacity:0.4"':''}>提交</button>
                    </span>`)
            : `<button class="btn btn-primary flex-1" onclick="this.closest('.page').${isLast ? '_finish' : '_next'}()">${isLast ? '完成' : '下一题'}</button>`
          }
        `;
      }
    }

    // 统一判断是否正确（支持多答案 q.answers 数组 或 单答案 q.answer）
    function isCorrect(q, ua) {
      if (!ua && ua !== 0) return false;
      if (ua === '__skipped__') return false;
      const ans = q.answers && q.answers.length ? q.answers : q.answer;
      if (q.type === '填空') return Utils.matchFill(ua, ans);
      if (q.type === '多选') {
        // ua 是排序后的字母数组，q.answer 是字母字符串如 "ABC"
        const correctLetters = Array.isArray(q.answer)
          ? [...q.answer].sort().join('')
          : (q.answer||'').split('').filter(c=>/[A-Z]/.test(c)).sort().join('');
        const userLetters = Array.isArray(ua)
          ? [...ua].sort().join('')
          : (ua||'').split('').filter(c=>/[A-Z]/.test(c)).sort().join('');
        return userLetters === correctLetters;
      }
      if (Array.isArray(ans)) return ans.some(a => ua === a);
      return ua === ans;
    }

    async function submitAnswer() {
      const q = questions[curIdx];
      answered = true;
      answers[curIdx] = userAnswer;

      const skipped = userAnswer === '__skipped__';
      const correct = !skipped && isCorrect(q, userAnswer);

      // SM-2 SRS 更新 + 统计
      if (!isExam) {
        const freshQ = (await DB.getAllQuestions()).find(x => x.id === q.id) || q;
        // grade: 5=轻松答对, 4=正确, 3=勉强对, 0=跳过/答错
        const grade = skipped ? 0 : correct ? 5 : 0;  // grade5=轻松答对→EF增大
        const srsResult = Utils.srsUpdate(freshQ, grade);
        Object.assign(freshQ, srsResult);
        Object.assign(q, freshQ);
        await DB.saveQuestion(freshQ);

        const totalAnswered = ((await DB.getMeta('totalAnswered')) || 0) + 1;
        const totalRight = ((await DB.getMeta('totalRight')) || 0) + (correct && !skipped ? 1 : 0);
        const totalWrong = ((await DB.getMeta('totalWrong')) || 0) + (!correct || skipped ? 1 : 0);
        await DB.setMeta('totalAnswered', totalAnswered);
        await DB.setMeta('totalRight', totalRight);
        await DB.setMeta('totalWrong', totalWrong);

        const pts = (correct && !skipped) ? 2 : (skipped ? 0 : 1);  // 答对+2，答错+1，不会做+0
        const points = ((await DB.getMeta('points')) || 0) + pts;
        State.points = points;
        await DB.setMeta('points', points);
      }
      renderQ();
    }

    // 考试提交
    async function submitExam() {
      if (examTimer) clearInterval(examTimer);
      const timeTaken = Math.floor((Date.now() - examStartTime) / 1000);
      let right = 0;
      for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const ua = answers[i];
        const correct = isCorrect(q, ua);
        if (correct) right++;
        const freshQ = (await DB.getAllQuestions()).find(x => x.id === q.id) || q;
        if (ua !== null && ua !== undefined) {
          const grade = correct ? 5 : 0;
          Object.assign(freshQ, Utils.srsUpdate(freshQ, grade));
          await DB.saveQuestion(freshQ);
        }
      }
      // 积分
      const examPoints = right * 3;
      const points = ((await DB.getMeta('points')) || 0) + examPoints;
      await DB.setMeta('points', points);
      // 更新总统计
      const ta = questions.length;
      await DB.setMeta('totalAnswered', ((await DB.getMeta('totalAnswered'))||0) + ta);
      await DB.setMeta('totalRight', ((await DB.getMeta('totalRight'))||0) + right);
      await DB.setMeta('totalWrong', ((await DB.getMeta('totalWrong'))||0) + (ta - right));
      // 显示成绩页
      showResult(right, questions.length, timeTaken, examPoints);
    }

    function showResult(right, total, timeSec, pts, isPractice = false) {
      const pct = Math.round(right / total * 100);
      const grade = pct >= 90 ? '🎉 优秀' : pct >= 75 ? '👍 良好' : pct >= 60 ? '😊 及格' : '💪 继续加油';
      const skipped = answers.filter(a => a === '__skipped__').length;
      const unanswered = answers.filter(a => a === null).length;
      body.innerHTML = `
        <div class="result-score">
          <div class="result-circle" style="--pct:${pct}%">
            <div class="result-circle-inner">
              <div class="result-score-num">${pct}%</div>
              <div class="result-score-label">正确率</div>
            </div>
          </div>
          <div class="result-title">${grade}</div>
          <div class="result-sub">${right}/${total} 题正确 · 用时 ${Utils.fmtTime(timeSec)}</div>
        </div>
        <div class="stat-card" style="margin:0 0 12px">
          <div class="stat-row"><span class="stat-label">答对</span><span class="stat-val text-success">${right} 题</span></div>
          <div class="stat-row"><span class="stat-label">答错</span><span class="stat-val text-danger">${total - right - skipped - unanswered} 题</span></div>
          ${skipped > 0 ? `<div class="stat-row"><span class="stat-label">不会做</span><span class="stat-val" style="color:var(--warn)">${skipped} 题</span></div>` : ''}
          ${unanswered > 0 ? `<div class="stat-row"><span class="stat-label">未答</span><span class="stat-val">${unanswered} 题</span></div>` : ''}
          ${!isPractice ? `<div class="stat-row"><span class="stat-label">本次获得积分</span><span class="stat-val"><span class="points-badge" style="font-size:14px">${Icons.coin}+${pts}</span></span></div>` : ''}
        </div>
      `;
      footer.innerHTML = `
        <button class="btn btn-outline flex-1" onclick="this.closest('.page')._quit()">返回首页</button>
        ${!isPractice ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._reviewExam()">逐题查看</button>` : ''}
      `;
      el._reviewExam = () => {
        curIdx = 0;
        el._viewMode = true;
        renderQView();
      };
    }

    // 查看模式（考试后逐题）
    function renderQView() {
      const q = questions[curIdx];
      const ua = answers[curIdx];
      const correct = ua === q.answer ||
        (q.type === '填空' && ua && Utils.matchFill(ua, q.answer));
      // 用 el.querySelector 避免 document.getElementById 在离屏时失效
      const pf = el.querySelector('#quiz-progress');
      const ce = el.querySelector('#quiz-count');
      if (pf) pf.style.width = `${(curIdx+1)/questions.length*100}%`;
      if (ce) ce.textContent = `${curIdx+1}/${questions.length}`;

      let qBody = '';
      if (q.type === '单选' || q.type === '判断') {
        const opts = q.type === '单选' ? (q.options || []) : ['正确', '错误'];
        qBody = `<div class="option-list">
          ${opts.map((o, i) => {
            const letter = q.type === '单选' ? String.fromCharCode(65+i) : o;
            let cls = '';
            if (letter === q.answer) cls = 'correct';
            else if (letter === ua && ua !== q.answer) cls = 'wrong';
            return `<div class="option-item ${cls}" style="pointer-events:none">
              <div class="option-letter">${q.type === '单选' ? letter : (o === '正确' ? '✓' : '✗')}</div>
              <div class="option-text">${Utils.esc(o)}</div>
              ${letter === q.answer ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else {
        qBody = `
          <div style="margin-bottom:10px">
            <div class="tag ${correct ? 'tag-success' : (ua ? 'tag-danger' : 'tag-warn')}">
              ${ua ? (correct ? '✓ 正确' : '✗ 错误') : '未作答'}
            </div>
            ${ua ? `<div style="margin-top:8px;padding:12px;background:var(--bg2);border-radius:10px;font-size:15px">你的答案：${Utils.esc(ua)}</div>` : ''}
          </div>
          <div style="background:var(--success-light);border-radius:10px;padding:12px">
            <div style="font-size:13px;color:var(--success);font-weight:600;margin-bottom:4px">正确答案</div>
            <div style="font-size:15px;color:var(--text)">${Utils.esc(q.answer)}</div>
          </div>
        `;
      }

      const hasNote = q.note && q.note.trim();
      body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="quiz-type-badge" style="margin-bottom:0">${q.type}</div>

            <button id="view-search-btn" style="display:flex;align-items:center;gap:3px;color:var(--accent);font-size:12px;padding:3px 8px;border:1px solid var(--accent-light);border-radius:12px;background:var(--accent-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>&nbsp;搜题</button>
          </div>
        </div>
        <div class="quiz-question">${Utils.esc(q.question)}</div>
        ${qBody}
        ${q.explanation ? `<div class="explanation-box"><div class="explanation-title">💡 解析</div><div class="explanation-text">${Utils.esc(q.explanation)}</div></div>` : ''}
      `;
      body.querySelector('#view-search-btn')?.addEventListener('click', () => {
        window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(q.question), '_blank');
      });
      body.querySelector('#view-note-btn')?.addEventListener('click', () => {
        Actions._showNoteEditor(q, () => renderQView());
      });

      const isFirst = curIdx === 0, isLast = curIdx === questions.length - 1;
      footer.innerHTML = `
        <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._viewPrev()" style="${isFirst?'opacity:0.4':''}">上题</button>
        ${isLast
          ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._quit()">完成</button>`
          : `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._viewNext()">下题</button>`}
      `;
      el._viewPrev = () => { if (curIdx > 0) { curIdx--; renderQView(); } };
      el._viewNext = () => { if (curIdx < questions.length - 1) { curIdx++; renderQView(); } };
    }

    // 方法绑定
    el._quit = () => {
      // 弹出确认对话框
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay center';
      overlay.innerHTML = `
        <div class="modal-dialog" style="max-width:300px;text-align:center">
          <div style="font-size:40px;margin-bottom:8px">🚪</div>
          <div class="modal-title" style="margin-bottom:6px">退出做题？</div>
          <div style="font-size:14px;color:var(--text3);margin-bottom:20px">当前进度将不会保存</div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-outline flex-1" onclick="this.closest('.modal-overlay').remove()">继续做题</button>
            <button class="btn btn-danger flex-1" id="confirm-quit-btn">确认退出</button>
          </div>
        </div>`;
      overlay.querySelector('#confirm-quit-btn').onclick = () => {
        overlay.remove();
        StudyTimer.stop();
        if (examTimer) clearInterval(examTimer);
        Nav.pop();
      };
      document.body.appendChild(overlay);
    };
    el._prev = () => { if (curIdx > 0) { curIdx--; multiSelected = []; renderQ(); } };
    el._next = () => { if (curIdx < questions.length - 1) { curIdx++; multiSelected = []; renderQ(); } };
    el._submitFill = () => {
      const inp = el.querySelector('#fill-answer');
      if (!inp) return;
      userAnswer = inp.value.trim();
      if (!userAnswer) { Utils.toast('请输入答案'); return; }
      submitAnswer();
    };
    el._skipQ = () => {
      // 不会做 = 用空字符串作答，走 submitAnswer 流程显示解析，权重增加在 submitAnswer 里处理
      userAnswer = '__skipped__';
      submitAnswer();
    };
    el._submitSingle = () => {
      if (!userAnswer) { Utils.toast('请先选择答案'); return; }
      submitAnswer();
    };
    el._submitMulti = () => {
      if (!multiSelected.length) { Utils.toast('请至少选择一个选项'); return; }
      userAnswer = [...multiSelected].sort();
      submitAnswer();
    };
    el._submitExam = () => submitExam();
    el._finish = async () => {
      StudyTimer.stop();
      const timeTaken = Math.floor((Date.now() - examStartTime) / 1000);
      const right = answers.filter((a, i) => isCorrect(questions[i], a)).length;
      const pts = (await DB.getMeta('points')) || 0; // 已在答题时累积
      showResult(right, questions.length, timeTaken, 0, true);
    };
    // 修正当前题目的答案（做题中发现答案有误时用）
    el._editAnswer = () => {
      const q = questions[curIdx];
      Actions.editAnswerInQuiz(q, () => {
        // 回调：刷新题目显示（用更新后的答案重新判断）
        const allDBQs = DB.getAllQuestions();
        allDBQs.then(dbqs => {
          const fresh = dbqs.find(x => x.id === q.id);
          if (fresh) Object.assign(q, fresh);
          renderQ();
        });
      });
    };

    // 考试计时器
    if (isExam && timeLimit > 0) {
      examTimer = setInterval(() => {
        examSecLeft--;
        const el2 = el.querySelector('#timer-text');
        if (el2) el2.textContent = Utils.fmtTime(examSecLeft);
        if (examSecLeft <= 0) { clearInterval(examTimer); submitExam(); }
      }, 1000);
    }

    renderQ();
    return el;
  },
};

    // 强制 reflow，确保浏览器记录当前颜色状态作为动画起点
    void html.offsetHeight;
    // 第二帧：再改主题，浏览器就能从"旧颜色"过渡到"新颜色"
    requestAnimationFrame(() => {
      State.darkMode = !State.darkMode;
      html.setAttribute('data-theme', State.darkMode ? 'dark' : '');
      document.querySelector('meta[name="color-scheme"]').setAttribute('content', State.darkMode ? 'only dark' : 'only light');

  async _doLocalImport() {
    const input = document.getElementById('import-input');
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      input.value = '';
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        let count = 0;
        // 支持格式：{ folders: [{name, questions:[...]}] } 或 { questions:[...] }
        if (data.folders) {
          for (const f of data.folders) {
            // 查找或创建文件夹
            const folders = await DB.getFolders();
            let folder = folders.find(x => x.name === f.name);
            if (!folder) {
              const id = await DB.saveFolder({ name: f.name, createdAt: Date.now() });
              folder = { id, name: f.name };
            }
            if (f.questions) {
              for (const q of f.questions) {
                const answers = q.answers && q.answers.length ? q.answers : (q.answer ? [String(q.answer)] : []);
                await DB.saveQuestion({
                  folderId: folder.id,
                  type: q.type || '填空',
                  question: q.question || q.content || '',
                  options: q.options,
                  answer: String(q.answer || ''),
                  answers,
                  explanation: q.explanation || '',
                  wrongCount: 0, rightCount: 0, weight: 1, starred: false,
                  createdAt: Date.now(),
                });
                count++;
              }
            }
          }
        } else if (data.questions) {
          const folders = await DB.getFolders();
          let folder = folders[0];
          if (!folder) {
            const id = await DB.saveFolder({ name: '导入题库', createdAt: Date.now() });
            folder = { id };
          }
          for (const q of data.questions) {
            await DB.saveQuestion({
              folderId: folder.id,
              type: q.type || '填空',
              question: q.question || '',
              options: q.options,
              answer: String(q.answer || ''),
              explanation: q.explanation || '',
              wrongCount: 0, rightCount: 0, weight: 1, starred: false,
              createdAt: Date.now(),
            });
            count++;
          }
        }
        Utils.toast(`成功导入 ${count} 道题目`);
        await Nav.refreshHome();
      } catch(e) {
        Utils.toast('导入失败，请检查文件格式');
        console.error(e);
      }
    };
    input.click();
  },

  async _doUrlImport() {
    const ov = document.createElement('div');
    ov.className = 'modal-overlay center';
    ov.innerHTML = `
      <div class="modal-dialog" style="max-width:340px">
        <div class="modal-title" style="margin-bottom:8px">🔗 链接导入</div>
        <div style="font-size:12px;color:var(--warn);background:var(--warn-light);border-radius:8px;padding:8px 10px;margin-bottom:12px">

        <input class="form-input" id="url-import-input" placeholder="https://example.com/quiz.json" style="margin-bottom:14px">

          <button class="btn btn-outline flex-1" onclick="this.closest('.modal-overlay').remove()">取消</button>

        </div>
      </div>`;
    ov.onclick = e => { if (e.target === ov) ov.remove(); };
    document.body.appendChild(ov);
    setTimeout(() => ov.querySelector('#url-import-input')?.focus(), 100);

    ov.querySelector('#url-import-ok').onclick = async () => {
      const url = ov.querySelector('#url-import-input').value.trim();
      if (!url) { Utils.toast('请输入URL'); return; }
      if (!url.startsWith('http')) { Utils.toast('请输入完整的 http/https 地址'); return; }
      ov.remove();

      // 显示"正在连接"状态（15s 超时）
      const loading = document.createElement('div');
      loading.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center';
      loading.innerHTML = `<div class="modal-dialog" style="text-align:center;padding:24px 32px;min-width:220px">
        <div style="font-size:32px;margin-bottom:8px">🔗</div>
        <div style="font-size:15px;font-weight:500;color:var(--text)" id="loading-msg">正在尝试连接...</div>
        <div style="font-size:12px;color:var(--text3);margin-top:6px">超时时间 15 秒</div>
      </div>`;
      document.body.appendChild(loading);

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);

      let text, filename;
      try {
        const resp = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!resp.ok) throw new Error('服务器返回 ' + resp.status);

        // 从 URL 提取文件名
        let filename = decodeURIComponent(url.split('/').pop().split('?')[0]) || 'quiz.json';
        if (!filename.endsWith('.json')) filename += '.json';

        loading.querySelector('#loading-msg').textContent = '正在读取文件...';
        text = await resp.text();

        // 检验 JSON 格式
        let data;
        try { data = JSON.parse(text); } catch(e) {
          loading.remove();
          Utils.toast('❌ 该链接内容不是有效的 JSON 格式，无法导入');
          return;
        }
        if (!data.folders && !data.questions) {
          loading.remove();
          Utils.toast('❌ JSON 格式不符合题库格式要求');
          return;
        }

        loading.remove();

        // 确认下载弹窗，显示文件名
        const ok = await Utils.confirm(
          '确认下载',
          `检测到文件：
📄 ${filename}

确认下载并导入题库？`,
          '确认下载', false
        );
        if (!ok) return;

        // 导入
        let count = 0;
        if (data.folders) {
          for (const f of data.folders) {
            const folders = await DB.getFolders();
            let folder = folders.find(x => x.name === f.name);
            if (!folder) {
              const id = await DB.saveFolder({ name: f.name, createdAt: Date.now() });
              folder = { id, name: f.name };
            }
            for (const q of (f.questions || [])) {
              const answers = q.answers && q.answers.length ? q.answers : (q.answer ? [String(q.answer)] : []);
              await DB.saveQuestion({
                folderId: folder.id, type: q.type||'填空',
                question: q.question||'', options: q.options,
                answer: String(q.answer||''), answers,
                explanation: q.explanation||'',
                note: q.note||'',
                wrongCount:0, rightCount:0, starred:false, createdAt:Date.now()
              });
              count++;
            }
          }
        } else if (data.questions) {
          const folders = await DB.getFolders();
          let folder = folders[0];
          if (!folder) {
            const id = await DB.saveFolder({ name: '导入题库', createdAt: Date.now() });
            folder = { id };
          }
          for (const q of data.questions) {
            await DB.saveQuestion({
              folderId: folder.id, type: q.type||'填空',
              question: q.question||'', options: q.options,
              answer: String(q.answer||''), explanation: q.explanation||'',
              note: q.note||'',
              wrongCount:0, rightCount:0, starred:false, createdAt:Date.now()
            });
            count++;
          }
        }
        Utils.toast(`✅ 成功导入 ${count} 道题目`);
        await Nav.refreshHome();
      } catch(err) {
        clearTimeout(timeoutId);
        loading.remove();
        if (err.name === 'AbortError') {
          Utils.toast('⏱️ 连接超时（15秒），请检查链接是否有效');
        } else {
          Utils.toast('❌ 连接失败：' + (err.message || '网络错误'));
        }
      }
    };
  },

  // 导出JSON
  async exportJSON() {
    const folders = await DB.getFolders();
    const allQs = await DB.getAllQuestions();
    const data = {
      exportTime: new Date().toISOString(),
      folders: folders.map(f => ({
        name: f.name,
        questions: allQs.filter(q => q.folderId === f.id).map(q => {
          const out = { type: q.type, question: q.question, answer: q.answer };
          if (q.options && q.options.length) out.options = q.options;
          if (q.answers && q.answers.length > 1) out.answers = q.answers;
          if (q.explanation) out.explanation = q.explanation;
          if (q.note) out.note = q.note;
          if (q.wrongCount) out.wrongCount = q.wrongCount;
          if (q.rightCount) out.rightCount = q.rightCount;
          if (q.starred) out.starred = true;
          return out;
        })
      }))
    };
    const json = JSON.stringify(data, null, 2);
    const filename = `刷题宝-${new Date().toLocaleDateString('zh').replace(/\//g,'-')}.json`;
    const blob = new Blob([json], { type: 'application/json' });

    // 优先使用 Web Share API（Android 原生分享，APK 里也能用）
    if (navigator.share && navigator.canShare) {
      try {
        const file = new File([blob], filename, { type: 'application/json' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: '刷题宝题库' });
          Utils.toast('已打开分享');
          return;
        }
      } catch(e) {
        if (e.name === 'AbortError') return; // 用户取消，不处理
        // 其他错误继续尝试下载
      }
    }

    // 回退方案：浏览器下载
    try {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
      Utils.toast('已开始下载');
    } catch(e) {
      // 最后回退：显示弹窗让用户手动复制
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay center';
      overlay.innerHTML = `
        <div class="modal-dialog" style="max-width:340px">
          <div class="modal-title">导出题库</div>
          <div class="modal-sub">长按下方内容全选复制，保存为 .json 文件</div>
          <textarea class="form-input form-textarea" style="min-height:200px;font-size:11px;font-family:monospace" readonly>${Utils.esc(json)}</textarea>
          <div style="display:flex;gap:10px;margin-top:12px">
            <button class="btn btn-outline flex-1" onclick="this.closest('.modal-overlay').remove()">关闭</button>
            <button class="btn btn-primary flex-1" onclick="navigator.clipboard?.writeText(${JSON.stringify(json)}).then(()=>Utils.toast('已复制到剪贴板'))">复制</button>
          </div>
        </div>`;
      overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
      document.body.appendChild(overlay);
    }
  },

  // 重置所有统计
  async resetAllStats() {
    const resetOk = await Utils.confirm('重置所有统计', '积分、答题记录将清零，题目不会被删除', '确认重置', true);
    if (!resetOk) return;
    const qs = await DB.getAllQuestions();
    for (const q of qs) {
      q.wrongCount = 0; q.rightCount = 0; q.weight = 1;
      await DB.saveQuestion(q);
    }
    await DB.setMeta('points', 0);
    await DB.setMeta('totalAnswered', 0);
    await DB.setMeta('totalRight', 0);
    await DB.setMeta('totalWrong', 0);
    Utils.toast('统计已重置');
    await Nav.refreshCurrent();
  },

  // 删除所有数据（核弹选项）
  async nukeAllData() {
    const ok1 = await Utils.confirm('删除所有数据', '这将删除所有题目、文件夹和统计记录，完全不可恢复！', '我知道后果，继续', true);
    if (!ok1) return;
    const ok2 = await Utils.confirm('最后确认', '确定要清空所有数据吗？', '确认清空', true);
    if (!ok2) return;
    // 显示全屏进度遮罩，让用户知道操作正在进行
    const blocker = document.createElement('div');
    blocker.style.cssText = 'position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px';
    blocker.innerHTML = `
      <div style="font-size:40px">🗑️</div>
      <div style="font-size:16px;font-weight:600;color:var(--text)">正在清除所有数据...</div>
      <div style="font-size:13px;color:var(--text3)">请稍候，即将重新加载</div>`;
    document.body.appendChild(blocker);
    // 必须先关闭当前DB连接，否则deleteDatabase会触发onblocked永远卡住
    try { DB._closeConnection(); } catch(e) {}
    await new Promise(resolve => {
      const req = indexedDB.deleteDatabase('QuizAppDB');
      req.onsuccess = resolve;
      req.onerror = resolve;
      req.onblocked = () => {
        // 被阻塞时强制关闭所有连接后重试
        setTimeout(resolve, 300);
      };
    });
    location.reload();
  },
};

/* =========================================================
   拦截手机物理返回键 → 返回首页
   ========================================================= */
window.addEventListener('popstate', (e) => {
  const app = document.getElementById('app');
  const pages = app.querySelectorAll('.page');
  if (pages.length <= 1) {
    // 已在首页，再加一条历史防止意外退出浏览器
    history.pushState(null, '', location.href);
    return;
  }
  // 做题页：用退出确认弹窗而非直接 pop
  const top = pages[pages.length - 1];
  if (top && top._isQuizPage) {
    history.pushState(null, '', location.href);
    top._quit(); // 触发退出确认弹窗
    return;
  }
  // 其他页面：正常返回
  history.pushState(null, '', location.href);
  Nav.pop();
});

  const savedTheme = await DB.getMeta('darkMode');
  if (savedTheme) {
    State.darkMode = true;
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('meta[name="color-scheme"]').setAttribute('content', 'only dark');
  }

  // 渲染首页
  await Pages.renderHome();

  // 添加popstate历史记录（防止物理返回键退出）
  history.pushState(null, '', location.href);
}

// 启动
main().catch(console.error);
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.log('SW 注册失败:', err));
      });
    }
  </script>
