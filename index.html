<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="刷题宝">
  <meta name="theme-color" content="#1A56DB">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<!-- 强制阻止浏览器系统深色模式覆盖 -->
<meta name="color-scheme" content="only light">
<title>刷题宝</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   CSS变量 & 主题
   ========================================================= */
:root {
  --bg: #F5F4F0;
  --bg2: #ECEAE4;
  --card: #FFFFFF;
  --card2: #F9F8F5;
  --border: #E2DFD8;
  --text: #1A1814;
  --text2: #6B6860;
  --text3: #9E9B94;
  --accent: #4F46E5;
  --accent-light: #EEF2FF;
  --accent2: #0D9488;
  --accent2-light: #F0FDFB;
  --danger: #DC2626;
  --danger-light: #FEF2F2;
  --warn: #D97706;
  --warn-light: #FFFBEB;
  --success: #16A34A;
  --success-light: #F0FDF4;
  --appbar: #FFFFFF;
  --appbar-border: #E8E5DE;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow2: 0 4px 24px rgba(0,0,0,0.12);
  --radius: 14px;
  --radius2: 10px;
  --radius3: 8px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #000000;
  --bg2: #111111;
  --card: #1C1C1E;
  --card2: #2C2C2E;
  --border: #3A3A3C;
  --text: #F5F5F7;
  --text2: #AEAEB2;
  --text3: #636366;
  --accent: #818CF8;
  --accent-light: #1E1B4B;
  --accent2: #2DD4BF;
  --accent2-light: #042F2E;
  --danger: #F87171;
  --danger-light: #2D1515;
  --warn: #FBB928;
  --warn-light: #2D1F00;
  --success: #4ADE80;
  --success-light: #052E16;
  --appbar: #1C1C1E;
  --appbar-border: #3A3A3C;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --shadow2: 0 4px 24px rgba(0,0,0,0.6);
}

/* =========================================================
   基础重置
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  font-size: 15px;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; color: var(--text); background: transparent; border: none; outline: none; }

/* =========================================================
   页面栈容器
   ========================================================= */
#app {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  background: var(--bg);
}

/* =========================================================
   页面基础样式
   ========================================================= */
.page {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  will-change: transform;
  /* 默认不可见，由JS控制显示 */
}
/* 页面进入动画：从右滑入 */
.page.slide-in {
  animation: slideInRight var(--transition) forwards;
}
/* 页面离开动画：向右滑出 */
.page.slide-out {
  animation: slideOutRight var(--transition) forwards;
}
/* 上层页面退出时，下层页面恢复 */
.page.reveal-back {
  animation: revealBack var(--transition) forwards;
}
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to   { transform: translateX(0); }
}
@keyframes slideOutRight {
  from { transform: translateX(0); }
  to   { transform: translateX(100%); }
}
@keyframes revealBack {
  from { transform: translateX(-8%) scale(0.97); opacity: 0.85; }
  to   { transform: translateX(0) scale(1); opacity: 1; }
}
/* 当前页面被压入后台时的效果 */
.page.push-back {
  animation: pushBack var(--transition) forwards;
}
@keyframes pushBack {
  from { transform: translateX(0) scale(1); opacity: 1; }
  to   { transform: translateX(-8%) scale(0.97); opacity: 0.85; }
}

/* =========================================================
   AppBar
   ========================================================= */
.appbar {
  display: flex;
  align-items: center;
  height: 56px;
  padding: 0 4px;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.appbar-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.appbar-btn:active { background: var(--bg2); }
.appbar-btn svg { width: 22px; height: 22px; }
.appbar-title {
  flex: 1;
  text-align: left;
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding: 0 4px;
}
.appbar-actions { display: flex; align-items: center; }

/* =========================================================
   搜索栏
   ========================================================= */
.search-bar {
  padding: 8px 14px;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
}
.search-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg2);
  border-radius: 10px;
  padding: 0 10px;
  gap: 8px;
}
.search-input-wrap svg { width: 16px; height: 16px; color: var(--text3); flex-shrink: 0; }
.search-input-wrap input {
  flex: 1; height: 36px;
  font-size: 14px;
  color: var(--text);
  background: transparent;
}
.search-input-wrap input::placeholder { color: var(--text3); }
.search-clear { color: var(--text3); padding: 4px; }

/* =========================================================
   滚动内容区
   ========================================================= */
.page-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 14px;
  background: var(--bg);
}
.page-content::-webkit-scrollbar { display: none; }

/* =========================================================
   顶部摘要栏
   ========================================================= */
.summary-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
}
.summary-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.summary-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}
.summary-label {
  font-size: 11px;
  color: var(--text3);
}
.summary-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
}

/* =========================================================
   卡片
   ========================================================= */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 12px;
}
.card-header {
  display: flex;
  align-items: center;
  padding: 14px 16px 10px;
  gap: 8px;
}
.card-title {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.card-body { padding: 0 16px 14px; }
.card-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
  transition: background 0.12s;
}
.card-row:first-child { border-top: none; }
.card-row:active { background: var(--bg2); }
.card-row-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-row-content { flex: 1; min-width: 0; }
.card-row-title { font-size: 15px; font-weight: 500; color: var(--text); }
.card-row-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.card-row-arrow { color: var(--text3); }
.card-row-arrow svg { width: 16px; height: 16px; }

/* =========================================================
   首页网格模块
   ========================================================= */
.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.home-tile {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 14px;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 100px;
  position: relative;
  overflow: hidden;
}
.home-tile:active { transform: scale(0.97); box-shadow: var(--shadow2); }
.home-tile-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.home-tile-icon svg { width: 22px; height: 22px; }
.home-tile-title { font-size: 15px; font-weight: 600; color: var(--text); }
.home-tile-sub { font-size: 12px; color: var(--text3); margin-top: -4px; }
.home-tile-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: var(--danger);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  line-height: 1.4;
}

/* =========================================================
   标签/芯片
   ========================================================= */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  gap: 4px;
}
.tag-accent { background: var(--accent-light); color: var(--accent); }
.tag-success { background: var(--success-light); color: var(--success); }
.tag-danger { background: var(--danger-light); color: var(--danger); }
.tag-warn { background: var(--warn-light); color: var(--warn); }
.tag-neutral { background: var(--bg2); color: var(--text2); }

/* =========================================================
   按钮
   ========================================================= */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius2);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  border: none;
}
.btn:active { opacity: 0.8; transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-block { width: 100%; }
.btn svg { width: 18px; height: 18px; }

/* =========================================================
   浮动操作按钮
   ========================================================= */
.fab {
  position: fixed;
  right: 20px; bottom: 24px;
  width: 54px; height: 54px;
  border-radius: 16px;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(79,70,229,0.4);
  cursor: pointer;
  z-index: 100;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.93); }
.fab svg { width: 24px; height: 24px; }

/* =========================================================
   题目卡片（题库列表）
   ========================================================= */
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 14px 10px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.q-card:active { background: var(--card2); }
.q-card-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
}
.q-card-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.q-card-text {
  flex: 1;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  word-break: break-all;
  /* 列表中截断 */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.q-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
}
.q-card-stats { font-size: 11px; color: var(--text3); }
.star-btn {
  color: var(--text3);
  transition: color 0.15s, transform 0.15s;
  padding: 4px;
}
.star-btn.starred { color: #F59E0B; }
.star-btn svg { width: 18px; height: 18px; }

/* =========================================================
   做题页面
   ========================================================= */
.quiz-header {
  padding: 10px 14px 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
}
.quiz-progress-bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.quiz-count { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.quiz-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px 100px;
}
.quiz-body::-webkit-scrollbar { display: none; }
.quiz-type-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 12px;
  background: var(--accent-light);
  color: var(--accent);
}
.quiz-question {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.65;
  color: var(--text);
  margin-bottom: 20px;
}
/* 单选/判断选项 */
.option-list { display: flex; flex-direction: column; gap: 10px; }
.option-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px;
  background: var(--card);
  border-radius: var(--radius2);
  box-shadow: var(--shadow);
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s, background 0.2s;
}
.option-item:active { background: var(--card2); }
.option-item.selected { border-color: var(--accent); background: var(--accent-light); }
.option-item.correct { border-color: var(--success); background: var(--success-light); }
.option-item.wrong { border-color: var(--danger); background: var(--danger-light); }
.option-letter {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600;
  flex-shrink: 0;
  color: var(--text2);
  transition: background 0.2s, color 0.2s;
}
.option-item.selected .option-letter { background: var(--accent); color: #fff; }
.option-item.correct .option-letter { background: var(--success); color: #fff; }
.option-item.wrong .option-letter { background: var(--danger); color: #fff; }
.option-text { font-size: 15px; color: var(--text); line-height: 1.5; flex: 1; }
/* 填空题 */
.fill-input-wrap {
  background: var(--card);
  border-radius: var(--radius2);
  box-shadow: var(--shadow);
  padding: 14px;
  margin-bottom: 12px;
}
.fill-input {
  width: 100%;
  font-size: 16px;
  color: var(--text);
  background: transparent;
  border-bottom: 2px solid var(--border);
  padding-bottom: 8px;
  transition: border-color 0.2s;
}
.fill-input:focus { border-color: var(--accent); }
/* 解析区 */
.explanation-box {
  background: var(--card2);
  border-radius: var(--radius2);
  padding: 14px;
  margin-top: 16px;
  border-left: 3px solid var(--accent);
}
.explanation-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
}
.explanation-text {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
}
/* 底部操作栏 */
.quiz-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  background: var(--appbar);
  border-top: 1px solid var(--appbar-border);
  display: flex;
  gap: 10px;
  z-index: 10;
}
.quiz-footer .btn { flex: 1; }

/* =========================================================
   考试计时器
   ========================================================= */
.exam-timer {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--warn-light);
  border-radius: 8px;
  color: var(--warn);
  font-size: 14px;
  font-weight: 600;
}
.exam-timer svg { width: 16px; height: 16px; }

/* =========================================================
   统计页面
   ========================================================= */
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}
.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 14px; color: var(--text2); }
.stat-val { font-size: 15px; font-weight: 600; color: var(--text); }

/* =========================================================
   积分展示
   ========================================================= */
.points-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: linear-gradient(135deg, #F59E0B, #EF4444);
  border-radius: 20px;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(245,158,11,0.3);
}
.points-badge svg { width: 16px; height: 16px; }

/* =========================================================
   过滤/标签条
   ========================================================= */
.filter-bar {
  display: flex;
  gap: 8px;
  padding: 8px 14px;
  overflow-x: auto;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  background: var(--bg2);
  color: var(--text2);
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.filter-chip.active {
  background: var(--accent-light);
  color: var(--accent);
  border-color: var(--accent);
}

/* =========================================================
   模态框/弹出层
   ========================================================= */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  padding: 0;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}
.modal-overlay { justify-content: center; }
.modal-overlay.center { align-items: center; padding: 20px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-sheet {
  width: 100%;
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 20px 18px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  max-height: 80vh;
  overflow-y: auto;
}
.modal-sheet::-webkit-scrollbar { display: none; }
.modal-dialog {
  width: 100%;
  background: var(--card);
  border-radius: 16px;
  padding: 20px 18px;
  animation: scaleIn 0.2s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes scaleIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.modal-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 16px;
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}

/* =========================================================
   表单
   ========================================================= */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius3);
  padding: 10px 12px;
  font-size: 15px;
  color: var(--text);
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); outline: none; }
.form-textarea {
  min-height: 80px;
  resize: vertical;
}
select.form-input { appearance: none; }

/* =========================================================
   空状态
   ========================================================= */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 14px;
  text-align: center;
}
.empty-state svg { color: var(--text3); }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text2); }
.empty-sub { font-size: 14px; color: var(--text3); }

/* =========================================================
   批量操作栏
   ========================================================= */
.batch-bar {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  background: var(--accent);
  gap: 10px;
  flex-shrink: 0;
}
.batch-bar-text { flex: 1; font-size: 14px; font-weight: 500; color: #fff; }
.batch-action-btn {
  padding: 6px 12px;
  background: rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  font-weight: 500;
}

/* =========================================================
   多选 checkbox（批量模式）
   ========================================================= */
.checkbox-wrap {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.checkbox-wrap.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.checkbox-wrap.checked::after {
  content: '';
  width: 12px; height: 8px;
  border-bottom: 2.5px solid #fff;
  border-left: 2.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

/* =========================================================
   成绩/结果页
   ========================================================= */
.result-score {
  text-align: center;
  padding: 30px 20px 20px;
}
.result-circle {
  width: 120px; height: 120px;
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin: 0 auto 16px;
  background: conic-gradient(var(--accent) 0%, var(--accent) var(--pct, 75%), var(--border) var(--pct, 75%));
  position: relative;
}
.result-circle-inner {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: var(--card);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.result-score-num { font-size: 28px; font-weight: 700; color: var(--text); }
.result-score-label { font-size: 12px; color: var(--text3); }
.result-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.result-sub { font-size: 14px; color: var(--text2); }

/* =========================================================
   Toast
   ========================================================= */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 9999;
  pointer-events: none;
  white-space: nowrap;
  animation: toastIn 0.2s ease, toastOut 0.3s ease 1.7s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* =========================================================
   加载指示
   ========================================================= */
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* =========================================================
   数据存储模块 (IndexedDB + localStorage回退)
   ========================================================= */
const DB = (() => {
  const DB_NAME = 'QuizAppDB';
  const DB_VERSION = 2;
  let db = null;
  let useLS = false; // 是否回退到localStorage

  // IndexedDB初始化
  async function init() {
    return new Promise((resolve) => {
      try {
        if (!window.indexedDB) { useLS = true; resolve(); return; }
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('folders'))
            db.createObjectStore('folders', { keyPath: 'id', autoIncrement: true });
          if (!db.objectStoreNames.contains('questions'))
            db.createObjectStore('questions', { keyPath: 'id', autoIncrement: true });
          if (!db.objectStoreNames.contains('meta'))
            db.createObjectStore('meta', { keyPath: 'key' });
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(); };
        req.onerror = () => { useLS = true; resolve(); };
      } catch(e) { useLS = true; resolve(); }
    });
  }

  // IndexedDB通用操作
  function idbGet(store, key) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).get(key);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  function idbGetAll(store) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  function idbPut(store, val) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).put(val);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  function idbDelete(store, key) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).delete(key);
      req.onsuccess = () => res();
      req.onerror = () => rej(req.error);
    });
  }

  // localStorage辅助
  function lsKey(k) { return 'quizapp_' + k; }
  function lsGet(k, def) {
    try { const v = localStorage.getItem(lsKey(k)); return v ? JSON.parse(v) : def; }
    catch(e) { return def; }
  }
  function lsSet(k, v) { try { localStorage.setItem(lsKey(k), JSON.stringify(v)); } catch(e){} }

  // ---- 公开API ----
  async function getFolders() {
    if (useLS) return lsGet('folders', []);
    return idbGetAll('folders');
  }
  async function saveFolder(f) {
    if (useLS) {
      const list = lsGet('folders', []);
      if (f.id) { const i = list.findIndex(x => x.id === f.id); if(i>=0) list[i] = f; else list.push(f); }
      else { f.id = Date.now(); list.push(f); }
      lsSet('folders', list); return f.id;
    }
    return idbPut('folders', f);
  }
  async function deleteFolder(id) {
    if (useLS) {
      lsSet('folders', lsGet('folders', []).filter(x => x.id !== id));
      lsSet('questions', lsGet('questions', []).filter(x => x.folderId !== id));
      return;
    }
    await idbDelete('folders', id);
    // 删除该文件夹下所有题目
    const qs = await idbGetAll('questions');
    for (const q of qs) { if (q.folderId === id) await idbDelete('questions', q.id); }
  }
  async function getQuestions(folderId) {
    if (useLS) return lsGet('questions', []).filter(q => q.folderId === folderId);
    const all = await idbGetAll('questions');
    return all.filter(q => q.folderId === folderId);
  }
  async function getAllQuestions() {
    if (useLS) return lsGet('questions', []);
    return idbGetAll('questions');
  }
  async function saveQuestion(q) {
    if (useLS) {
      const list = lsGet('questions', []);
      if (q.id) { const i = list.findIndex(x => x.id === q.id); if(i>=0) list[i] = q; else list.push(q); }
      else { q.id = Date.now() + Math.random(); list.push(q); }
      lsSet('questions', list); return q.id;
    }
    return idbPut('questions', q);
  }
  async function deleteQuestion(id) {
    if (useLS) { lsSet('questions', lsGet('questions', []).filter(x => x.id !== id)); return; }
    await idbDelete('questions', id);
  }
  async function getMeta(key) {
    if (useLS) return lsGet('meta_' + key, null);
    const r = await idbGet('meta', key);
    return r ? r.value : null;
  }
  async function setMeta(key, value) {
    if (useLS) { lsSet('meta_' + key, value); return; }
    await idbPut('meta', { key, value });
  }

  function closeConnection() { try { if (db) { db.close(); db = null; } } catch(e) {} }
  return { init, getFolders, saveFolder, deleteFolder, getQuestions, getAllQuestions, saveQuestion, deleteQuestion, getMeta, setMeta, _closeConnection: closeConnection };
})();

/* =========================================================
   全局状态
   ========================================================= */
const State = {
  darkMode: false,
  points: 0,
  pageStack: [],
  searchQuery: '',
  batchMode: false,
  batchSelected: new Set(),
  studyTimer: null,
  studySecCount: 0,
};

// 学习计时器：只在做题/考试页计时，每满60秒自动写入一次
const StudyTimer = {
  start() {
    if (State.studyTimer) return;
    State.studyTimer = setInterval(async () => {
      State.studySecCount = (State.studySecCount || 0) + 1;
      if (State.studySecCount >= 60) {
        State.studySecCount = 0;
        const cur = (await DB.getMeta('studyMinutes')) || 0;
        await DB.setMeta('studyMinutes', cur + 1);
      }
    }, 1000);
  },
  stop() {
    if (State.studyTimer) { clearInterval(State.studyTimer); State.studyTimer = null; }
    State.studySecCount = 0;
  }
};

/* =========================================================
   工具函数
   ========================================================= */
const Utils = {
  // 生成唯一ID
  uid() { return Date.now() + '_' + Math.random().toString(36).substr(2, 6); },
  // 格式化时间
  fmtTime(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  // 从数组按权重随机抽取
  srsUpdate(q, grade) {
    const now = Date.now();
    let ef  = q.srsEase     != null ? q.srsEase     : 2.5;
    let ivl = q.srsInterval != null ? q.srsInterval : 0;
    let lvl = q.srsLevel    != null ? q.srsLevel    : 0;
    if (grade >= 3) {
      if (lvl === 0)      ivl = 1440;
      else if (lvl === 1) ivl = 5760;
      else                ivl = Math.round(ivl * ef);
      lvl++;
      ef = ef + 0.1 - (5 - grade) * (0.08 + (5 - grade) * 0.02);
      ef = Math.max(1.3, parseFloat(ef.toFixed(3)));
    } else {
      ivl = 10; lvl = 0;
      ef  = Math.max(1.3, parseFloat((ef - 0.2).toFixed(3)));
    }
    return {
      srsLevel: lvl, srsInterval: ivl, srsEase: ef,
      srsLastReview: now, srsNextReview: now + ivl * 60000,
      wrongCount: grade < 3 ? (q.wrongCount||0)+1 : (q.wrongCount||0),
      rightCount: grade >= 3 ? (q.rightCount||0)+1 : (q.rightCount||0),
    };
  },
  srsSample(items, n) {
    const now = Date.now();
    const fresh  = items.filter(x => !x.srsNextReview);
    const due    = items.filter(x => x.srsNextReview && x.srsNextReview <= now).sort((a,b) => a.srsNextReview - b.srsNextReview);
    const notDue = items.filter(x => x.srsNextReview && x.srsNextReview > now).sort((a,b) => a.srsNextReview - b.srsNextReview);
    return [...due, ...fresh, ...notDue].slice(0, Math.min(n, items.length));
  },
  unseenSample(items, n) {
    const unseen = items.filter(x => !x.rightCount && !x.wrongCount).sort(() => Math.random()-0.5);
    const seen   = items.filter(x =>  x.rightCount ||  x.wrongCount).sort(() => Math.random()-0.5);
    return [...unseen, ...seen].slice(0, Math.min(n, items.length));
  },
  weightedSample(items, n, mode = 'srs') {
    if (mode === 'srs')    return Utils.srsSample(items, n);
    if (mode === 'unseen') return Utils.unseenSample(items, n);
    return [...items].sort(() => Math.random()-0.5).slice(0, Math.min(n, items.length));
  },
  // HTML转义
  esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },
  // 延迟
  sleep(ms) { return new Promise(r => setTimeout(r, ms)); },
  // Toast提示
  toast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  },
  // 统一确认弹窗（替代 confirm()）
  confirm(title, msg, okText = '确认', danger = false) {
    return new Promise(resolve => {
      const ov = document.createElement('div');
      ov.className = 'modal-overlay center';
      ov.innerHTML = `<div class="modal-dialog" style="max-width:300px;text-align:center">
        <div style="font-size:36px;margin-bottom:8px">${danger ? '⚠️' : '❓'}</div>
        <div class="modal-title" style="margin-bottom:6px">${Utils.esc(title)}</div>
        <div style="font-size:14px;color:var(--text3);margin-bottom:20px">${Utils.esc(msg)}</div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline flex-1" id="uc-cancel">取消</button>
          <button class="btn ${danger?'btn-danger':'btn-primary'} flex-1" id="uc-ok">${Utils.esc(okText)}</button>
        </div></div>`;
      ov.querySelector('#uc-ok').onclick = () => { ov.remove(); resolve(true); };
      ov.querySelector('#uc-cancel').onclick = () => { ov.remove(); resolve(false); };
      ov.onclick = e => { if(e.target===ov) { ov.remove(); resolve(false); } };
      document.body.appendChild(ov);
    });
  },
  // 防抖
  debounce(fn, ms) {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  },

  /* =========================================================
     填空题智能比对算法
     支持：顺序无关、标点/空格忽略、多答案数组、模糊容错
     ========================================================= */
  matchFill(userRaw, correctRaw) {
    if (!userRaw || !correctRaw) return false;

    // 支持多答案：correctRaw 可以是字符串或数组
    // 数组中任意一个答案匹配即算对
    if (Array.isArray(correctRaw)) {
      return correctRaw.some(ans => Utils.matchFill(userRaw, ans));
    }

    // 标准化：去首尾空白、全角转半角、转小写
    function normalize(s) {
      return s.trim()
        .toLowerCase()
        .replace(/[\uff01-\uff5e]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0))
        .replace(/\u3000/g, ' ');
    }

    // 去除所有标点、空格，只留汉字和字母数字
    function stripAll(s) {
      return s.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
    }

    // 按常见分隔符拆词
    function tokenize(s) {
      return s.split(/[,，、\/\\；;:\s]+/).map(t => t.trim()).filter(Boolean);
    }

    // 字符排序（用于检测同字异序）
    function sortChars(s) {
      return s.split('').sort().join('');
    }

    // Levenshtein 编辑距离
    function editDist(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, (_, i) => [i]);
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
          dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
            : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      return dp[m][n];
    }

    const user    = normalize(userRaw);
    const correct = normalize(correctRaw);
    const uStrip  = stripAll(user);
    const cStrip  = stripAll(correct);

    // ① 完全一致
    if (user === correct) return true;

    // ② 去标点空格后一致
    if (uStrip === cStrip) return true;

    // ③ 字符排序后一致（同字异序，如"整体式模块式"↔"模块式整体式"）
    if (uStrip.length === cStrip.length && sortChars(uStrip) === sortChars(cStrip)) return true;

    // ④ 拆词后集合匹配（顺序无关，每词允许模糊）
    const uTokens = tokenize(uStrip.length ? uStrip : user);
    const cTokens = tokenize(cStrip.length ? cStrip : correct);

    if (uTokens.length > 0 && cTokens.length > 0) {
      const matched = new Set();
      let allMatched = true;

      for (const ct of cTokens) {
        let found = false;
        for (let i = 0; i < uTokens.length; i++) {
          if (matched.has(i)) continue;
          const ut = uTokens[i];
          const maxDist = ct.length <= 2 ? 0 : ct.length <= 4 ? 1 : 2;
          if (ut === ct || editDist(ut, ct) <= maxDist) {
            matched.add(i); found = true; break;
          }
        }
        if (!found) { allMatched = false; break; }
      }
      if (allMatched && matched.size === cTokens.length) return true;

      // ⑤ 拆词再拼接去标点（应对漏分隔符：直接连写）
      const uJoin = uTokens.join('');
      const cJoin = cTokens.join('');
      if (uJoin === cJoin) return true;
      if (sortChars(uJoin) === sortChars(cJoin)) return true;
    }

    // ⑥ 整体编辑距离容错（短答案1字、中等2字、长答案3字）
    const threshold = cStrip.length <= 3 ? 1 : cStrip.length <= 7 ? 2 : 3;
    if (editDist(uStrip, cStrip) <= threshold) return true;

    return false;
  },
};

/* =========================================================
   导航模块（页面栈）
   ========================================================= */
const Nav = {
  // 推入新页面（push-back 与 slide-in 同步进行）
  push(type, params = {}) {
    const app = document.getElementById('app');
    const topEl = app.querySelector('.page:last-child');

    // 先渲染新页面并加入 DOM（但还在屏幕右侧）
    State.pageStack.push({ type, params });
    const el = Pages.render(type, params);
    el.style.transform = 'translateX(100%)';
    app.appendChild(el);

    // 下一帧同时触发两个动画，保证完全同步
    // 每次 push 追加一条历史，保证每一层都能用系统返回键退回
    history.pushState({ depth: State.pageStack.length }, '', location.href);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // 旧页面：推向左后方
        if (topEl) {
          topEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s cubic-bezier(0.4,0,0.2,1)';
          topEl.style.transform = 'translateX(-8%) scale(0.97)';
          topEl.style.opacity = '0.85';
          topEl.addEventListener('transitionend', () => {
            topEl.style.transition = '';
          }, { once: true });
        }
        // 新页面：从右滑入
        el.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
        el.style.transform = 'translateX(0)';
        el.addEventListener('transitionend', () => {
          el.style.transition = '';
        }, { once: true });
      });
    });

    State.batchMode = false;
    State.batchSelected.clear();
  },
  // 弹出当前页面（返回上层）
  pop() {
    const app = document.getElementById('app');
    const pages = app.querySelectorAll('.page');
    if (pages.length <= 1) return;
    State.pageStack.pop();
    const topEl = pages[pages.length - 1];
    const belowEl = pages[pages.length - 2];

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // 顶层页面滑出到右侧
        topEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
        topEl.style.transform = 'translateX(100%)';
        topEl.addEventListener('transitionend', () => topEl.remove(), { once: true });
        // 下层页面同步从左后方恢复
        if (belowEl) {
          belowEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s cubic-bezier(0.4,0,0.2,1)';
          belowEl.style.transform = 'translateX(0) scale(1)';
          belowEl.style.opacity = '1';
          belowEl.addEventListener('transitionend', () => {
            belowEl.style.transition = '';
          }, { once: true });
        }
      });
    });

    State.batchMode = false;
    State.batchSelected.clear();
    // 返回时刷新上一页（如果有 _refreshFn）和首页摘要
    setTimeout(async () => {
      await Nav.refreshCurrent();
      Nav.refreshHome();
    }, 350);
  },
  // 返回首页（清除所有子页面）
  home() {
    const app = document.getElementById('app');
    const pages = app.querySelectorAll('.page');
    if (pages.length <= 1) return;
    const topEl = pages[pages.length - 1];
    const base = pages[0];

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // 顶层页面滑出
        topEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
        topEl.style.transform = 'translateX(100%)';
        // 底层首页同步恢复
        if (base && base !== topEl) {
          base.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s cubic-bezier(0.4,0,0.2,1)';
          base.style.transform = 'translateX(0) scale(1)';
          base.style.opacity = '1';
          base.addEventListener('transitionend', () => { base.style.transition = ''; }, { once: true });
        }
        topEl.addEventListener('transitionend', () => {
          // 移除中间所有页面
          const allPages = app.querySelectorAll('.page');
          for (let i = allPages.length - 1; i >= 1; i--) allPages[i].remove();
          State.pageStack = [];
          State.batchMode = false;
          State.batchSelected.clear();
          Nav.refreshHome();
        }, { once: true });
      });
    });
  },
  // 刷新首页摘要（包括错题徽章）
  async refreshHome() {
    const pages = document.getElementById('app')?.querySelectorAll('.page');
    const home = pages?.[0]; // 首页始终是第一个页面
    if (!home) return;
    const summary = home.querySelector('.summary-bar');
    if (summary) {
      const d = await Pages.getHomeSummary();
      summary.innerHTML = Pages.renderSummaryHTML(d);
      // 同步更新首页错题徽章
      const wrongTile = [...home.querySelectorAll('.home-tile')].find(t => t.querySelector('.home-tile-title')?.textContent.trim() === '错题');
      if (wrongTile) {
        const badge = wrongTile.querySelector('.home-tile-badge');
        if (d.wrong > 0) {
          if (badge) badge.textContent = d.wrong;
          else {
            const b = document.createElement('span');
            b.className = 'home-tile-badge';
            b.textContent = d.wrong;
            wrongTile.appendChild(b);
          }
        } else if (badge) badge.remove();
      }
    }
  },
  // 刷新当前顶部页面内容（做题后刷新列表）
  async refreshCurrent() {
    const app = document.getElementById('app');
    const pages = app.querySelectorAll('.page');
    const topEl = pages[pages.length - 1];
    if (!topEl || !topEl._refreshFn) return;
    await topEl._refreshFn();
  }
};

      const PRESET_COLORS = ['#EEF2FF','#F0FDF4','#FFF7ED','#FDF2F8','#F0FDFA','#FEF9C3','#F1F5F9'];
      const PRESET_DARK =   ['#1E1B4B','#052E16','#431407','#3B0764','#042F2E','#422006','#1E293B'];
      const folderCards = await Promise.all(folders.map(async (f, idx) => {
        const qs = await DB.getQuestions(f.id);
        const wrong = qs.filter(q => q.wrongCount > 0).length;
        const starred = qs.filter(q => q.starred).length;
        const ci = idx % PRESET_COLORS.length;
        const bgLight = f.color || PRESET_COLORS[ci];
        const bgDark  = f.colorDark || PRESET_DARK[ci];
        const iconChar = f.icon || '';
        return `
          <div class="card" style="margin-bottom:10px">
            <div class="card-row" onclick="Nav.push('folder',{folderId:${f.id}})">
              <div class="card-row-icon" style="background:${bgLight}" data-dark-bg="${bgDark}">
                ${iconChar
                  ? `<span style="font-size:18px;line-height:1">${Utils.esc(iconChar)}</span>`
                  : `<span style="color:${bgLight==='#F0FDF4'?'#16A34A':bgLight==='#FFF7ED'?'#EA580C':bgLight==='#FDF2F8'?'#A21CAF':bgLight==='#F0FDFA'?'#0D9488':'#4F46E5'}">${Icons.folder}</span>`
                }
              </div>
              <div class="card-row-content">
                <div class="card-row-title">${Utils.esc(f.name)}</div>
                <div class="card-row-sub">${qs.length} 题${wrong?` · ${wrong}错题`:''}${starred?` · ${starred}收藏`:''}</div>
              </div>
              <div style="display:flex;gap:8px;align-items:center">
                <button class="appbar-btn" style="width:36px;height:36px" onclick="event.stopPropagation();Actions.folderMenu(${f.id},${Utils.esc(JSON.stringify(f.name))})">
                  ${Icons.more}
                </button>
                <div class="card-row-arrow">${Icons.chevron}</div>
              </div>
            </div>
          </div>`;
      }));
      // Apply dark mode backgrounds
      setTimeout(() => {
        document.querySelectorAll('[data-dark-bg]').forEach(el2 => {
          if (State.darkMode) el2.style.background = el2.dataset.darkBg;
        });
      }, 0);
      content.innerHTML = `
        <div class="section-title">所有文件夹</div>
        ${folderCards.join('')}
      `;
    }
    el._refreshFn = refresh;
    refresh();
    return el;
  },

  /* =====================================================
     文件夹内容（题目列表）
     ===================================================== */
  renderFolder(params) {
    const { folderId } = params;
    const el = Pages.createPage('加载中...');
    let filterType = 'all'; // all / wrong / fav / 单选 / 判断 / 填空
    let batchMode = false;
    let batchSet = new Set();

    // 搜索栏
    const searchDiv = document.createElement('div');
    searchDiv.className = 'search-bar';
    searchDiv.innerHTML = `
      <div class="search-input-wrap">
        ${Icons.search}
        <input type="text" placeholder="搜索本文件夹..." id="folder-search">
        <button class="search-clear" id="search-clear-btn" style="display:none">${Icons.close}</button>
      </div>`;
    el.appendChild(searchDiv);

    // 过滤条
    const filterBar = document.createElement('div');
    filterBar.className = 'filter-bar';
    filterBar.id = 'folder-filter';
    el.appendChild(filterBar);

    // 批量操作栏（初始隐藏）
    const batchBarEl = document.createElement('div');
    batchBarEl.className = 'batch-bar';
    batchBarEl.style.display = 'none';
    el.appendChild(batchBarEl);

    // 内容
    const content = document.createElement('div');
    content.className = 'page-content';
    content.style.paddingBottom = 'calc(80px + env(safe-area-inset-bottom))';
    el.appendChild(content);

    // FAB 添加题目
    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.innerHTML = Icons.plus;
    fab.style.bottom = 'calc(24px + env(safe-area-inset-bottom))';
    fab.style.zIndex = '100';
    fab.onclick = () => Nav.push('editQ', { folderId, qId: null });
    el.appendChild(fab);

    let allQs = [];
    let searchQuery = '';

    async function refresh() {
      // 获取文件夹信息
      const folders = await DB.getFolders();
      const folder = folders.find(f => f.id === folderId) || { name: '文件夹' };
      el.querySelector('.appbar-title').textContent = folder.name;

      allQs = await DB.getQuestions(folderId);
      render();
    }

    let displayLimit = 50; // 虚拟分页：每次最多显示50条

    function render() {
      // 过滤条渲染
      const filters = [
        { key: 'all', label: '全部' },
        { key: 'wrong', label: '错题' },
        { key: 'fav', label: '收藏' },
        { key: '单选', label: '单选' },
        { key: '判断', label: '判断' },
        { key: '填空', label: '填空' },
        { key: '多选', label: '多选' },
      ];
      filterBar.innerHTML = filters.map(f => `
        <div class="filter-chip${filterType===f.key?' active':''}" onclick="this.closest('.page')._setFilter('${f.key}')">
          ${f.label}
        </div>`).join('');

      // 过滤题目
      let qs = [...allQs];
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        qs = qs.filter(x => {
          try {
            return (x.question && x.question.toLowerCase().includes(q)) ||
              (x.answer && String(x.answer).toLowerCase().includes(q)) ||
              (x.explanation && x.explanation.toLowerCase().includes(q)) ||
              (x.options && x.options.some(o => o && o.toLowerCase().includes(q)));
          } catch(e) { return false; }
        });
      }
      if (filterType === 'wrong') qs = qs.filter(x => x.wrongCount > 0);
      else if (filterType === 'fav') qs = qs.filter(x => x.starred);
      else if (['单选','判断','填空','多选'].includes(filterType)) qs = qs.filter(x => x.type === filterType);

      // 批量模式操作栏
      if (batchMode) {
        fab.style.display = 'none';
        batchBarEl.style.display = 'flex';
        batchBarEl.innerHTML = `
          <span class="batch-bar-text">已选 ${batchSet.size} 题</span>
          <button class="batch-action-btn" onclick="this.closest('.page')._batchAll()">全选</button>
          <button class="batch-action-btn" onclick="this.closest('.page')._batchAction()">操作</button>
          <button class="batch-action-btn" onclick="this.closest('.page')._batchOff()">取消</button>
        `;
      } else {
        fab.style.display = '';
        batchBarEl.style.display = 'none';
      }

      if (!qs.length) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-title">${allQs.length?'无匹配题目':'暂无题目'}</div>
            <div class="empty-sub">${allQs.length?'尝试其他筛选条件':'点击右下角 + 添加题目'}</div>
          </div>`;
        return;
      }

      const shown = qs.slice(0, displayLimit);
      const hasMore = qs.length > displayLimit;

      // 用 innerHTML 渲染，但限制最多 displayLimit 条，避免大列表卡顿
      content.innerHTML = `
        <div class="flex-row" style="margin-bottom:10px">
          <span class="fs-13" style="color:var(--text3)">${qs.length} 题${hasMore?' · 显示前'+displayLimit+'条':''}</span>
          <div style="flex:1"></div>
          <button id="folder-batch-btn" style="font-size:13px;color:var(--accent);padding:4px 8px">批量操作</button>
          <button id="folder-startall-btn"
            style="font-size:13px;color:var(--accent2);padding:4px 8px;margin-left:4px">全部练习</button>
        </div>
        ${shown.map(q => Pages.renderQCard(q, batchMode, batchSet.has(q.id))).join('')}
        ${hasMore ? `<div id="load-more-btn" style="text-align:center;padding:14px;color:var(--accent);font-size:14px;cursor:pointer">显示更多（还有 ${qs.length - displayLimit} 条）</div>` : ''}
      `;

      const batchBtn = content.querySelector('#folder-batch-btn');
      if (batchBtn) batchBtn.onclick = () => { batchMode = true; render(); };
      const startAllBtn = content.querySelector('#folder-startall-btn');
      if (startAllBtn) startAllBtn.onclick = () => {
        if (qs.length) Nav.push('quiz', { questions: qs, startIdx: 0, mode: 'practice' });
      };
      const loadMoreBtn = content.querySelector('#load-more-btn');
      if (loadMoreBtn) loadMoreBtn.onclick = () => { displayLimit += 50; render(); };

      // 绑定点击事件
      content.querySelectorAll('.q-card').forEach(card => {
        const qid = +card.dataset.qid;
        card.onclick = (e) => {
          if (e.target.closest('.star-btn') || e.target.closest('[onclick]')) return;
          if (batchMode) {
            if (batchSet.has(qid)) batchSet.delete(qid); else batchSet.add(qid);
            render();
          } else {
            const q = allQs.find(x => x.id === qid);
            if (q) Actions._showQDetail(q, () => render());
          }
        };
        const starBtn = card.querySelector('.star-btn');
        if (starBtn) starBtn.onclick = async (e) => {
          e.stopPropagation();
          const q = allQs.find(x => x.id === qid);
          if (!q) return;
          q.starred = !q.starred;
          await DB.saveQuestion(q);
          starBtn.innerHTML = q.starred ? Icons.starFill : Icons.star;
          starBtn.className = 'star-btn' + (q.starred ? ' starred' : '');
          Utils.toast(q.starred ? '已收藏' : '已取消收藏');
        };
        let longPressTimer;
        card.addEventListener('touchstart', () => { longPressTimer = setTimeout(() => { batchMode = true; batchSet.add(qid); render(); }, 500); });
        card.addEventListener('touchend', () => clearTimeout(longPressTimer));
        card.addEventListener('touchmove', () => clearTimeout(longPressTimer));
      });
    }

    // 挂载方法供内联事件调用
    el._setFilter = (f) => { filterType = f; displayLimit = 50; render(); };
    el._batchOn = () => { batchMode = true; render(); };
    el._batchOff = () => { batchMode = false; batchSet.clear(); render(); };
    el._batchAll = () => { allQs.forEach(q => batchSet.add(q.id)); render(); };
    el._startAll = (ids) => {
      const qs = allQs.filter(q => ids.includes(q.id));
      if (qs.length) Nav.push('quiz', { questions: qs, startIdx: 0, mode: 'practice' });
    };
    el._batchAction = () => Actions.batchAction(folderId, [...batchSet], () => { batchMode = false; batchSet.clear(); refresh(); });
    el._refreshFn = refresh;

    // 搜索
    const searchInput = searchDiv.querySelector('#folder-search');
    const clearBtn = searchDiv.querySelector('#search-clear-btn');
    searchInput.oninput = Utils.debounce((e) => {
      searchQuery = e.target.value.trim();
      displayLimit = 50;
      clearBtn.style.display = searchQuery ? '' : 'none';
      render();
    }, 300);
    clearBtn.onclick = () => { searchInput.value = ''; searchQuery = ''; displayLimit = 50; clearBtn.style.display = 'none'; render(); };

    refresh();
    return el;
  },

  // 渲染题目卡片（列表中）
  renderQCard(q, batchMode = false, checked = false) {
    const typeColors = { '单选': 'tag-accent', '判断': 'tag-success', '填空': 'tag-warn' };
    return `
      <div class="q-card" data-qid="${q.id}">
        <div class="q-card-top">
          ${batchMode ? `<div class="checkbox-wrap${checked?' checked':''}"></div>` : ''}
          <div class="q-card-text">${Utils.esc(q.question)}</div>
          <button class="star-btn${q.starred?' starred':''}">
            ${q.starred ? Icons.starFill : Icons.star}
          </button>
        </div>
        <div class="q-card-footer">
          <div style="display:flex;gap:6px;align-items:center">
            <span class="tag ${typeColors[q.type]||'tag-neutral'}">${q.type}</span>
            ${q.wrongCount>0?`<span class="tag tag-danger">错${q.wrongCount}次</span>`:''}
            ${q.rightCount>0?`<span class="tag tag-success">对${q.rightCount}次</span>`:''}
            ${q.note?`<span class="tag tag-warn">✏️笔记</span>`:''}
            ${q.srsLastReview?`<span class="tag tag-neutral" style="font-size:10px">上次:${new Date(q.srsLastReview).toLocaleDateString('zh')}</span>`:''}
          </div>
            <button onclick="event.stopPropagation();Nav.push('editQ',{folderId:${q.folderId},qId:${q.id}})" 
              style="color:var(--accent);padding:4px 8px;font-size:13px;display:flex;align-items:center;gap:3px;border:1px solid var(--accent-light);border-radius:6px;background:var(--accent-light)">${Icons.edit} <span style="font-size:12px">编辑</span></button>
        </div>
      </div>`;
  },

  /* =====================================================
     编辑/新增题目
     ===================================================== */
  renderEditQ(params) {
    const { folderId, qId } = params;
    const el = Pages.createPage(qId ? '编辑题目' : '新增题目');
    const content = document.createElement('div');
    content.className = 'page-content';
    el.appendChild(content);

    let q = null;
    let qType = '填空';

    async function load() {
      if (qId) {
        const qs = await DB.getAllQuestions();
        q = qs.find(x => x.id === qId) || null;
        if (q) qType = q.type;
      }
      render();
    }

    function render() {
      // 题型列表，新增多选
      const types = ['单选', '多选', '判断', '填空'];
      const opts = q?.options || ['', ''];

      content.innerHTML = `
        <div class="card" style="padding:16px">
          <div class="form-group">
            <label class="form-label">题目类型</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              ${types.map(t => `
                <div class="filter-chip${qType===t?' active':''}" data-type="${t}">${t}</div>
              `).join('')}
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">题目内容</label>
            <textarea class="form-input form-textarea" id="q-question" placeholder="输入题目内容">${Utils.esc(q?.question||'')}</textarea>
          </div>

          ${qType === '单选' || qType === '多选' ? `
            <div class="form-group">
              <label class="form-label">
                选项
                <span style="color:var(--text3);font-weight:400;font-size:12px">（最多26个）</span>
              </label>
              <div id="options-list">
                ${opts.slice(0,26).map((o, i) => `
                  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px" data-opt-row="${i}">
                    <span style="width:22px;font-size:14px;color:var(--text3);font-weight:600;flex-shrink:0">${String.fromCharCode(65+i)}</span>
                    <input class="form-input" style="flex:1" placeholder="选项${String.fromCharCode(65+i)}" value="${Utils.esc(o)}" data-opt="${i}">
                    <button data-del-opt="${i}" style="color:var(--danger);padding:4px;flex-shrink:0;${opts.length<=2?'opacity:0.3;pointer-events:none':''}">${Icons.close}</button>
                  </div>`).join('')}
              </div>
              <button id="add-opt-btn" style="color:var(--accent);font-size:14px;padding:4px 0${opts.length>=26?' ;opacity:0.3;pointer-events:none':''}">+ 添加选项</button>
            </div>
            <div class="form-group">
              <label class="form-label">
                正确答案
                ${qType==='多选'?'<span style="color:var(--text3);font-weight:400;font-size:12px">（可多选）</span>':''}
              </label>
              <div id="answer-options" style="display:flex;gap:8px;flex-wrap:wrap">
                ${opts.slice(0,26).map((_, i) => {
                  const letter = String.fromCharCode(65+i);
                  const sel = qType==='多选'
                    ? (Array.isArray(q?.answer) ? q.answer.includes(letter) : (q?.answer||'').split('').includes(letter))
                    : q?.answer === letter;
                  return `<div data-ans-letter="${letter}" class="filter-chip${sel?' active':''}" style="min-width:36px;text-align:center">${letter}</div>`;
                }).join('')}
              </div>
            </div>
          ` : qType === '判断' ? `
            <div class="form-group">
              <label class="form-label">正确答案</label>
              <div style="display:flex;gap:8px">
                <div data-judge="正确" class="filter-chip${q?.answer==='正确'?' active':''}" style="flex:1;justify-content:center">✓ 正确</div>
                <div data-judge="错误" class="filter-chip${q?.answer==='错误'?' active':''}" style="flex:1;justify-content:center">✗ 错误</div>
              </div>
            </div>
          ` : `
            <div class="form-group">
              <label class="form-label">正确答案 <span style="color:var(--text3);font-weight:400;font-size:12px">（可添加多个，任意匹配即算对）</span></label>
              <div id="fill-answers-list"></div>
              <button id="add-fill-ans-btn" style="color:var(--accent);font-size:14px;padding:4px 0;margin-top:4px">+ 添加备选答案</button>
            </div>
          `}

          <div class="form-group">
            <label class="form-label">解析（选填）</label>
            <textarea class="form-input form-textarea" id="q-explanation" placeholder="输入解析说明">${Utils.esc(q?.explanation||'')}</textarea>
          </div>
          <div style="display:flex;gap:10px;margin-top:8px">
            <button class="btn btn-primary flex-1" id="save-q-btn">保存</button>
            ${qId ? `<button class="btn btn-danger" id="del-q-btn" style="padding:10px 16px">${Icons.trash}</button>` : ''}
          </div>
        </div>
      `;

      // ---- 绑定事件（全部用 addEventListener，不用 inline onclick）----

      // 切换题型
      content.querySelectorAll('[data-type]').forEach(chip => {
        chip.onclick = () => { qType = chip.dataset.type; render(); };
      });

      // 保存 / 删除
      content.querySelector('#save-q-btn').onclick = () => el._save();
      const delBtn = content.querySelector('#del-q-btn');
      if (delBtn) delBtn.onclick = () => el._delete();

      // ===== 单选/多选 =====
      if (qType === '单选' || qType === '多选') {
        const optList = content.querySelector('#options-list');
        const addOptBtn = content.querySelector('#add-opt-btn');
        const answerArea = content.querySelector('#answer-options');

        // 重新渲染答案选项区
        function refreshAnswerChips() {
          const inputs = [...optList.querySelectorAll('[data-opt]')];
          const n = inputs.length;
          answerArea.innerHTML = inputs.map((_, i) => {
            const letter = String.fromCharCode(65+i);
            return `<div data-ans-letter="${letter}" class="filter-chip" style="min-width:36px;text-align:center">${letter}</div>`;
          }).join('');
          // 重新绑定答案选择
          bindAnswerChips();
        }

        function bindAnswerChips() {
          answerArea.querySelectorAll('[data-ans-letter]').forEach(chip => {
            chip.onclick = () => {
              if (qType === '多选') {
                chip.classList.toggle('active');
              } else {
                answerArea.querySelectorAll('[data-ans-letter]').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
              }
            };
          });
        }
        bindAnswerChips();

        // 重新编号所有行
        function renumberOpts() {
          const rows = [...optList.querySelectorAll('[data-opt-row]')];
          rows.forEach((row, idx) => {
            row.setAttribute('data-opt-row', idx);
            row.querySelector('span').textContent = String.fromCharCode(65+idx);
            const inp = row.querySelector('[data-opt]');
            inp.setAttribute('data-opt', idx);
            inp.placeholder = `选项${String.fromCharCode(65+idx)}`;
            const delBtnOpt = row.querySelector('[data-del-opt]');
            delBtnOpt.setAttribute('data-del-opt', idx);
            delBtnOpt.style.opacity = rows.length <= 2 ? '0.3' : '1';
            delBtnOpt.style.pointerEvents = rows.length <= 2 ? 'none' : '';
          });
          addOptBtn.style.opacity = rows.length >= 26 ? '0.3' : '1';
          addOptBtn.style.pointerEvents = rows.length >= 26 ? 'none' : '';
          refreshAnswerChips();
        }

        // 删除选项
        optList.addEventListener('click', e => {
          const btn = e.target.closest('[data-del-opt]');
          if (!btn) return;
          const rows = optList.querySelectorAll('[data-opt-row]');
          if (rows.length <= 2) return;
          btn.closest('[data-opt-row]').remove();
          renumberOpts();
        });

        // 添加选项
        addOptBtn.onclick = () => {
          const rows = [...optList.querySelectorAll('[data-opt-row]')];
          if (rows.length >= 26) return;
          const n = rows.length;
          const div = document.createElement('div');
          div.setAttribute('data-opt-row', n);
          div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
          div.innerHTML = `
            <span style="width:22px;font-size:14px;color:var(--text3);font-weight:600;flex-shrink:0">${String.fromCharCode(65+n)}</span>
            <input class="form-input" style="flex:1" placeholder="选项${String.fromCharCode(65+n)}" data-opt="${n}">
            <button data-del-opt="${n}" style="color:var(--danger);padding:4px;flex-shrink:0">${Icons.close}</button>`;
          optList.appendChild(div);
          renumberOpts();
        };
      }

      // ===== 判断题 =====
      if (qType === '判断') {
        content.querySelectorAll('[data-judge]').forEach(chip => {
          chip.onclick = () => {
            content.querySelectorAll('[data-judge]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
          };
        });
      }

      // ===== 填空题 =====
      if (qType === '填空') {
        const fillList = content.querySelector('#fill-answers-list');
        const addFillBtn = content.querySelector('#add-fill-ans-btn');

        // 渲染已有答案行
        const initAnswers = q?.answers && q.answers.length ? q.answers : [q?.answer || ''];
        initAnswers.forEach((a, i) => addFillRow(a, i === 0));

        function addFillRow(val = '', isFirst = false) {
          const n = fillList.querySelectorAll('[data-fill-row]').length;
          const div = document.createElement('div');
          div.setAttribute('data-fill-row', n);
          div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
          div.innerHTML = `
            <input class="form-input" style="flex:1" placeholder="${n===0?'主答案':'备选答案'}" data-fill-ans="${n}" value="${Utils.esc(val)}">
            <button data-del-fill style="color:var(--danger);padding:4px;flex-shrink:0;${n===0?'opacity:0.3;pointer-events:none':''}">${Icons.close}</button>`;
          fillList.appendChild(div);
          // 删除按钮
          div.querySelector('[data-del-fill]').onclick = () => {
            if (n === 0) return;
            div.remove();
          };
        }

        addFillBtn.onclick = () => addFillRow();
      }
    }

    el._setType = (t) => { qType = t; render(); };
    el._save = async () => {
      const question = content.querySelector('#q-question')?.value.trim();
      if (!question) { Utils.toast('请输入题目内容'); return; }

      let answer = '';
      let options = undefined;
      const explanation = content.querySelector('#q-explanation')?.value.trim() || '';

      if (qType === '单选' || qType === '多选') {
        options = [...content.querySelectorAll('[data-opt]')].map(i => i.value.trim()).filter(Boolean);
        if (options.length < 2) { Utils.toast('至少需要2个选项'); return; }
        const selected = [...content.querySelectorAll('[data-ans-letter].active')].map(c => c.dataset.ansLetter);
        if (!selected.length) { Utils.toast('请选择正确答案'); return; }
        answer = qType === '多选' ? selected.join('') : selected[0];
      } else if (qType === '判断') {
        const active = content.querySelector('[data-judge].active');
        if (!active) { Utils.toast('请选择正确答案'); return; }
        answer = active.dataset.judge;
      } else {
        // 填空题：读取多答案
        const fillAnswers = [...content.querySelectorAll('[data-fill-ans]')].map(i => i.value.trim()).filter(Boolean);
        if (!fillAnswers.length) { Utils.toast('请输入答案'); return; }
        const fillData = {
          ...(q || { wrongCount: 0, rightCount: 0, weight: 1, starred: false }),
          folderId, type: qType, question,
          options: undefined, answer: fillAnswers[0], answers: fillAnswers,
          explanation, updatedAt: Date.now(),
        };
        if (qId) fillData.id = qId;
        await DB.saveQuestion(fillData);
        Utils.toast(qId ? '已保存' : '已添加');
        await Nav.pop(); return;
      }
      const saveData = {
        ...(q || { wrongCount: 0, rightCount: 0, weight: 1, starred: false }),
        folderId, type: qType, question,
        options, answer, explanation, updatedAt: Date.now(),
      };
      if (qId) saveData.id = qId;
      await DB.saveQuestion(saveData);
      Utils.toast(qId ? '已保存' : '已添加');
      await Nav.pop();
    };
    el._delete = async () => {
      const qDelOk = await Utils.confirm('删除题目', '确定删除这道题目？不可恢复', '确认删除', true);
      if (!qDelOk) return;
      await DB.deleteQuestion(qId);
      Utils.toast('已删除');
      await Nav.pop();
    };

    load();
    return el;
  },

  renderSrsAnalysis(params) {
    const el = Pages.createPage('SRS 算法分析');

    // ── Tab bar（固定在顶部，不随内容滚动）──────────────────────────
    const tabWrap = document.createElement('div');
    tabWrap.style.cssText = 'padding:10px 14px 0;background:var(--bg);flex-shrink:0;';
    tabWrap.innerHTML = `
      <div style="display:flex;background:var(--surface2);border-radius:12px;padding:3px;gap:2px" id="srs-tabbar">
        <button data-tab="struggling" style="flex:1;padding:9px 0;border-radius:9px;font-size:14px;font-weight:600;transition:all .2s;background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.1)">
          学习中 <span id="cnt-struggling" style="font-size:12px;font-weight:400"></span>
        </button>
        <button data-tab="mastered" style="flex:1;padding:9px 0;border-radius:9px;font-size:14px;font-weight:600;transition:all .2s;color:var(--text3);background:transparent">
          已掌握 <span id="cnt-mastered" style="font-size:12px;font-weight:400"></span>
        </button>
      </div>
      <div id="srs-indicator" style="display:flex;gap:4px;justify-content:center;margin-top:8px">
        <div style="width:20px;height:3px;border-radius:2px;background:var(--accent);transition:all .3s" id="dot-0"></div>
        <div style="width:8px;height:3px;border-radius:2px;background:var(--border);transition:all .3s" id="dot-1"></div>
      </div>`;
    el.appendChild(tabWrap);

    // ── Swipe container ────────────────────────────────────────────
    const swipeWrap = document.createElement('div');
    swipeWrap.style.cssText = 'flex:1;overflow:hidden;position:relative;';

    const track = document.createElement('div');
    track.style.cssText = 'display:flex;width:200%;height:100%;transition:transform .28s cubic-bezier(.4,0,.2,1);will-change:transform;';

    const panel0 = document.createElement('div'); // 学习中
    panel0.style.cssText = 'width:50%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 30px;box-sizing:border-box;';
    const panel1 = document.createElement('div'); // 已掌握
    panel1.style.cssText = 'width:50%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 30px;box-sizing:border-box;';

    track.appendChild(panel0);
    track.appendChild(panel1);
    swipeWrap.appendChild(track);
    el.appendChild(swipeWrap);

    let curTab = 0; // 0=学习中, 1=已掌握

    function switchTab(idx, animate = true) {
      curTab = idx;
      if (!animate) track.style.transition = 'none';
      track.style.transform = `translateX(${idx === 0 ? '0' : '-50%'})`;
      if (!animate) requestAnimationFrame(() => { track.style.transition = 'transform .28s cubic-bezier(.4,0,.2,1)'; });

      // Tab bar 样式
      tabWrap.querySelectorAll('[data-tab]').forEach((btn, i) => {
        const active = i === idx;
        btn.style.background = active ? 'var(--card)' : 'transparent';
        btn.style.boxShadow = active ? '0 1px 4px rgba(0,0,0,.1)' : 'none';
        btn.style.color = active ? (idx === 0 ? 'var(--accent)' : 'var(--success)') : 'var(--text3)';
      });

      // 指示点
      document.getElementById('dot-0').style.cssText = `width:${curTab===0?'20px':'8px'};height:3px;border-radius:2px;background:${curTab===0?'var(--accent)':'var(--border)'};transition:all .3s`;
      document.getElementById('dot-1').style.cssText = `width:${curTab===1?'20px':'8px'};height:3px;border-radius:2px;background:${curTab===1?'var(--success)':'var(--border)'};transition:all .3s`;
    }

    // Tab 点击
    tabWrap.querySelectorAll('[data-tab]').forEach((btn, i) => {
      btn.onclick = () => switchTab(i);
    });

    // Touch swipe
    let tx0 = 0, ty0 = 0, swiping = false;
    swipeWrap.addEventListener('touchstart', e => {
      tx0 = e.touches[0].clientX;
      ty0 = e.touches[0].clientY;
      swiping = false;
    }, { passive: true });
    swipeWrap.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - tx0;
      const dy = e.touches[0].clientY - ty0;
      if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
        swiping = true;
      }
      if (swiping) e.preventDefault();
    }, { passive: false });
    swipeWrap.addEventListener('touchend', e => {
      if (!swiping) return;
      const dx = e.changedTouches[0].clientX - tx0;
      if (dx < -40 && curTab === 0) switchTab(1);
      else if (dx > 40 && curTab === 1) switchTab(0);
    });

    function card(q) {
      const ivlMin = q.srsInterval || 0;
      const ivlStr = ivlMin < 60 ? `${ivlMin}分钟`
        : ivlMin < 1440 ? `${(ivlMin/60).toFixed(1)}小时`
        : `${(ivlMin/1440).toFixed(1)}天`;
      const ef = (q.srsEase||2.5).toFixed(2);
      const efColor = (q.srsEase||2.5) < 2.0 ? 'tag-danger' : (q.srsEase||2.5) < 2.4 ? 'tag-warn' : 'tag-success';
      return `<div class="q-card" style="margin-bottom:8px">
        <div class="q-card-text" style="font-size:13px;margin-bottom:6px">${Utils.esc(q.question.slice(0,80))}${q.question.length>80?'…':''}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="tag tag-neutral" style="font-size:10px">Lv.${q.srsLevel||0}</span>
          <span class="tag tag-neutral" style="font-size:10px">间隔 ${ivlStr}</span>
          <span class="tag ${efColor}" style="font-size:10px">难度 ${ef}</span>
          ${(q.rightCount||0)>0?`<span class="tag tag-success" style="font-size:10px">✓ ${q.rightCount}</span>`:''}
          ${(q.wrongCount||0)>0?`<span class="tag tag-danger" style="font-size:10px">✗ ${q.wrongCount}</span>`:''}
        </div>
      </div>`;
    }

    async function load() {
      const qs = await DB.getAllQuestions();
      const mastered = qs
        .filter(q => (q.rightCount||0) > 0 && (q.wrongCount||0) === 0 && (q.srsLevel||0) >= 2)
        .sort((a,b) => (b.rightCount||0) - (a.rightCount||0));
      const struggling = qs
        .filter(q => (q.wrongCount||0) > 0 || ((q.srsEase||2.5) < 2.5 && q.srsLastReview))
        .sort((a,b) => (a.srsEase||2.5) - (b.srsEase||2.5));

      document.getElementById('cnt-struggling').textContent = `(${struggling.length})`;
      document.getElementById('cnt-mastered').textContent = `(${mastered.length})`;

      panel0.innerHTML = struggling.length
        ? struggling.slice(0,100).map(card).join('') + (struggling.length>100?`<div style="text-align:center;font-size:12px;color:var(--text3);padding:10px">共 ${struggling.length} 道，显示前100</div>`:'')
        : '<div class="empty-state"><div class="empty-sub">暂无学习中的题目 🎉</div></div>';

      panel1.innerHTML = mastered.length
        ? mastered.slice(0,100).map(card).join('') + (mastered.length>100?`<div style="text-align:center;font-size:12px;color:var(--text3);padding:10px">共 ${mastered.length} 道，显示前100</div>`:'')
        : '<div class="empty-state"><div class="empty-sub">还没有已掌握的题目，加油！</div></div>';

      switchTab(0, false);
    }
    load();
    return el;
  },

  /* =====================================================

  renderSearch(params) {
    const el = Pages.createPage('搜索');
    // 搜索栏
    const searchDiv = document.createElement('div');
    searchDiv.className = 'search-bar';
    searchDiv.innerHTML = `
      <div class="search-input-wrap">
        ${Icons.search}
        <input type="text" placeholder="搜索题目、选项、解析..." id="global-search" autofocus>
        <button class="search-clear" id="global-search-clear" style="display:none">${Icons.close}</button>
      </div>`;
    el.appendChild(searchDiv);
    const content = document.createElement('div');
    content.className = 'page-content';
    el.appendChild(content);

    content.innerHTML = `<div class="empty-state"><div style="color:var(--text3)">${Icons.search}</div><div class="empty-sub">输入关键词搜索题目</div></div>`;

    const searchInput = searchDiv.querySelector('#global-search');
    const clearBtn = searchDiv.querySelector('#global-search-clear');

    let searchLimit = 50;
    let lastResults = [];

    async function doSearch(query) {
      if (!query) {
        content.innerHTML = `<div class="empty-state"><div style="color:var(--text3)">${Icons.search}</div><div class="empty-sub">输入关键词搜索题目</div></div>`;
        return;
      }
      const allQs = await DB.getAllQuestions();
      const q = query.toLowerCase();
      lastResults = allQs.filter(x => {
        try {
          return (x.question && x.question.toLowerCase().includes(q)) ||
            (x.answer && String(x.answer).toLowerCase().includes(q)) ||
            (x.explanation && x.explanation.toLowerCase().includes(q)) ||
            (x.options && x.options.some(o => o && o.toLowerCase().includes(q)));
        } catch(e) { return false; }
      });
      renderResults();
    }

    function renderResults() {
      if (!lastResults.length) {
        content.innerHTML = `<div class="empty-state"><div class="empty-title">无结果</div><div class="empty-sub">换个关键词试试</div></div>`;
        return;
      }
      const shown = lastResults.slice(0, searchLimit);
      const hasMore = lastResults.length > searchLimit;
      content.innerHTML = `
        <div class="fs-13" style="color:var(--text3);margin-bottom:10px">找到 ${lastResults.length} 条${hasMore?' · 显示前'+searchLimit+'条':''}</div>
        ${shown.map(q => Pages.renderQCard(q)).join('')}
        ${hasMore ? `<div id="search-more" style="text-align:center;padding:14px;color:var(--accent);font-size:14px;cursor:pointer">显示更多（还有 ${lastResults.length - searchLimit} 条）</div>` : ''}
      `;
      content.querySelector('#search-more')?.addEventListener('click', () => { searchLimit += 50; renderResults(); });
      content.querySelectorAll('.q-card').forEach(card => {
        card.onclick = (e) => {
          if (e.target.closest('[onclick]')) return;
          const qid = +card.dataset.qid;
          const idx = lastResults.findIndex(q => q.id === qid);
          Nav.push('quiz', { questions: lastResults, startIdx: idx, mode: 'practice' });
        };
      });
    }

    searchInput.oninput = Utils.debounce((e) => {
      const v = e.target.value.trim();
      searchLimit = 50;
      clearBtn.style.display = v ? '' : 'none';
      doSearch(v);
    }, 300);
    clearBtn.onclick = () => { searchInput.value = ''; searchLimit = 50; clearBtn.style.display = 'none'; doSearch(''); };
    if (params.query) { searchInput.value = params.query; doSearch(params.query); }
    return el;
  },
